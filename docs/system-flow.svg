<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1450" viewBox="0 0 1200 1450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2b2b2b"/>
    </marker>
    <style>
      .title { font: 700 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .label { font: 600 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .small { font: 500 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #333; }
      .box { stroke: #2b2b2b; stroke-width: 2; rx: 18; ry: 18; }
      .arrow { stroke: #2b2b2b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1450" fill="#fcfbf7"/>
  <text x="600" y="54" text-anchor="middle" class="title">SEH System Flow / 系统流程图</text>

  <rect x="420" y="95" width="360" height="88" class="box" fill="#ffd43b"/>
  <text x="600" y="130" text-anchor="middle" class="label">Dataset Input</text>
  <text x="600" y="160" text-anchor="middle" class="small">cases/*.yaml + manifest.yaml</text>

  <path d="M600 183 L600 255" class="arrow"/>

  <rect x="360" y="255" width="480" height="100" class="box" fill="#a5d8ff"/>
  <text x="600" y="292" text-anchor="middle" class="label">Load + Validate Dataset</text>
  <text x="600" y="322" text-anchor="middle" class="small">LoadCases / LoadManifest / ComputeDatasetHash</text>

  <path d="M600 355 L600 430" class="arrow"/>

  <rect x="390" y="430" width="420" height="88" class="box" fill="#b2f2bb"/>
  <text x="600" y="465" text-anchor="middle" class="label">Resolve Runtime</text>
  <text x="600" y="495" text-anchor="middle" class="small">registry -&gt; SkillRuntime</text>

  <path d="M600 518 L600 600" class="arrow"/>

  <rect x="290" y="600" width="620" height="116" class="box" fill="#ffc9c9"/>
  <text x="600" y="638" text-anchor="middle" class="label">Execute Cases</text>
  <text x="600" y="670" text-anchor="middle" class="small">worker pool / timeout / retry / tag / sample / seed</text>

  <path d="M600 716 L600 810" class="arrow"/>

  <rect x="250" y="810" width="700" height="128" class="box" fill="#d0bfff"/>
  <text x="600" y="848" text-anchor="middle" class="label">Aggregate RunResult</text>
  <text x="600" y="882" text-anchor="middle" class="small">metrics / score / classification / failure clusters / stability variance</text>

  <path d="M250 874 L120 874 L120 1040 L300 1040" class="arrow"/>
  <rect x="50" y="1040" width="300" height="96" class="box" fill="#a5d8ff"/>
  <text x="200" y="1078" text-anchor="middle" class="label">JSON Outputs</text>
  <text x="200" y="1110" text-anchor="middle" class="small">run / score / matrix / drift / frontier</text>

  <path d="M600 938 L600 1040" class="arrow"/>
  <rect x="435" y="1040" width="330" height="96" class="box" fill="#b2f2bb"/>
  <text x="600" y="1078" text-anchor="middle" class="label">History Store</text>
  <text x="600" y="1110" text-anchor="middle" class="small">.history/ + baseline pointer</text>

  <rect x="840" y="1040" width="280" height="96" class="box" fill="#ffe8cc"/>
  <text x="980" y="1078" text-anchor="middle" class="label">Remote Run Ingest</text>
  <text x="980" y="1110" text-anchor="middle" class="small">seh ingest --run remote.json</text>
  <path d="M840 1088 L765 1088" class="arrow"/>

  <path d="M765 1088 L1020 1088 L1020 1230" class="arrow"/>
  <rect x="745" y="1230" width="350" height="130" class="box" fill="#d0bfff"/>
  <text x="920" y="1270" text-anchor="middle" class="label">History-based Analytics</text>
  <text x="920" y="1304" text-anchor="middle" class="small">compare / drift / leaderboard / frontier</text>
  <text x="920" y="1334" text-anchor="middle" class="small">simulate / stability / routing / regression</text>
</svg>
